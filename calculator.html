<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Calculator</title>
    <link rel="stylesheet" href="style.css">
    <!-- PyScript -->
    <link rel="stylesheet"
          href="https://pyscript.net/releases/2025.3.1/core.css">
    <script type="module"
            src="https://pyscript.net/releases/2025.3.1/core.js"></script>
    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
<header class="navbar">
    <div class="logo">🐍 Python Calculator</div>
    <nav>
        <a href="index.html">Home</a>
    </nav>
</header>
<div class="calculator-container">
    <div class="calculator">
        <h2>Kalkulator Python</h2>
        <div class="display-wrapper">
            <div id="history"></div>
            <input
                id="display"
                type="text"
                readonly
                value="0">
        </div>
        <div class="display-actions">
            <button
                id="copy-btn"
                class="copy-btn"
                onclick="copy_result()">
                📋 Copy
            </button>
        </div>
        
        <div class="buttons">
            <button onclick="clear_display()">C</button>
            <button onclick="delete_last()">DEL</button>
            <button onclick="append('%')">%</button>
            <button class="operator" onclick="append('/')">÷</button>

            <button onclick="append('7')">7</button>
            <button onclick="append('8')">8</button>
            <button onclick="append('9')">9</button>
            <button class="operator" onclick="append('*')">×</button>

            <button onclick="append('4')">4</button>
            <button onclick="append('5')">5</button>
            <button onclick="append('6')">6</button>
            <button class="operator" onclick="append('-')">−</button>

            <button onclick="append('1')">1</button>
            <button onclick="append('2')">2</button>
            <button onclick="append('3')">3</button>
            <button class="operator" onclick="append('+')">+</button>

            <button onclick="append('0')">0</button>
            <button onclick="append('.')">.</button>

            <button class="equal"
                    style="grid-column: span 2;"
                    onclick="calculate()">
                =
            </button>
        </div>
    </div>
</div>

<!-- Memanggil file Python -->
<py-script src="script.py"></py-script>
<!-- <script type="py" src="script.py"></script> -->

</body>
</html>
